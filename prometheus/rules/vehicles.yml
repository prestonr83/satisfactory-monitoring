groups:
  - name: Vehicles
    rules:
    - alert: TrainDerailed
      expr: train_derailed > ${TRAIN_DERAILED_THRESHOLD}
      for: ${TRAIN_DERAILED_FOR}
      labels:
        category: vehicles
      annotations:
        summary: "A train has derailed"
        description: "Train {{ $labels.name }} has gone off the rails!"
