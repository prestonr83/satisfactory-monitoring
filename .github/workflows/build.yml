on:
  push:
    paths-ignore:
      - "*.md"
      - "docker-compose.yml"
      - "**.md"
      - "resources/**"
      - "public-dashboards/**"
      - "**.gitignore"
  pull_request:

env:
  BUILDKIT_PROGRESS: plain
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.22.0"
      - name: gofmt cache
        working-directory: ./frmcache/src/app
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            exit 1
          fi
      - name: gofmt alertmanager-config
        working-directory: ./alertmanager-config/src/app
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            exit 1
          fi
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.22.0"
      - name: Run tests
        working-directory: ./frmcache/src/app
        run: go test ./...

  publish:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    env:
      TAG: ${{ (github.ref == 'refs/heads/main' && 'latest') || (github.ref == 'refs/heads/dev' && 'dev') || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build images
        run: |
          docker buildx build --push --platform linux/amd64,linux/arm64 --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ficsit-remote-monitoring-cache:${{ env.TAG }} ./frmcache
          docker buildx build --push --platform linux/amd64,linux/arm64 --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ficsit-remote-monitoring-alertmanager-config:${{ env.TAG }} ./alertmanager-config
          docker buildx build --push --platform linux/amd64,linux/arm64 --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ficsit-remote-monitoring-companion:${{ env.TAG }} ./frmcompanion
